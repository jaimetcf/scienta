services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scienta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scienta
      POSTGRES_USER: scienta_user
      POSTGRES_PASSWORD: scienta_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scienta_network

volumes:
  postgres_data:

networks:
  scienta_network:
    name: scienta_network
