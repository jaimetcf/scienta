services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      # Browser must reach the backend; adjust when publishing behind a hostname.
      API_URL: http://localhost:8000
    secrets:
      - openai_api_key
    networks:
      - scienta_network

networks:
  scienta_network:
    external: true

secrets:
  openai_api_key:
    file: ../secrets/openai_api_key.txt
