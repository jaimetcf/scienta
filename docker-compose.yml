services:
  reflex_ui:
    build:
      context: ./reflex_ui
      dockerfile: Dockerfile
    container_name: scienta_reflex_ui
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      API_URL: http://localhost:8000
      # Set via `docker compose --env-file scienta_app/.env ...`.
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in scienta_app/.env (Neon connection string)}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-me-in-production}
      N8N_CHAT_WEBHOOK: http://n8n:5600/webhook/56f8a2c7-4f52-4464-aef5-a4d0c61c2c01
      N8N_SUMMARY_WEBHOOK: http://n8n:5600/webhook/89b8e991-306d-4ee5-8a36-a27a4c3a426f
    secrets:
      - openai_api_key
    networks:
      - scienta_network

  n8n:
    build:
      context: ./n8n_scienta
      dockerfile: Dockerfile
    container_name: scienta_n8n
    ports:
      - "5600:5600"
    volumes:
      - ./n8n_scienta:/home/node/.n8n
    environment:
      N8N_PORT: 5600
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_RESTRICT_FILE_ACCESS_TO: /files
    restart: unless-stopped
    networks:
      - scienta_network

networks:
  scienta_network:
    name: scienta_network

secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
