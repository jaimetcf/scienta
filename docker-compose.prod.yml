services:
  reflex_ui:
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-https://app.example.com}
      DATABASE_URL: ${DATABASE_URL}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      N8N_CHAT_WEBHOOK: ${N8N_CHAT_WEBHOOK}
      N8N_SUMMARY_WEBHOOK: ${N8N_SUMMARY_WEBHOOK}
    # Expose only on loopback; Caddy will be the public entrypoint.
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:8000:8000"

  n8n:
    restart: unless-stopped
    environment:
      N8N_PORT: 5600
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      N8N_RESTRICT_FILE_ACCESS_TO: /files
      # Needed by n8n behind reverse proxy + TLS.
      N8N_HOST: ${N8N_HOST:-n8n.example.com}
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${WEBHOOK_URL:-https://n8n.example.com/}
    # Expose only on loopback; Caddy will terminate TLS.
    ports:
      - "127.0.0.1:5600:5600"
